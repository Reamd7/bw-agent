name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag (e.g. v0.1.0) to build artifacts for'
        type: string
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build (${{ matrix.artifact-name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact-name: bw-agent-linux-x86_64
          # Linux ARM64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact-name: bw-agent-linux-aarch64
          # macOS x86_64 (cross-compiled on ARM runner)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact-name: bw-agent-macos-x86_64
          # macOS ARM64 (native on ARM runner)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: bw-agent-macos-aarch64
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: bw-agent-windows-x86_64
          # Windows ARM64
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact-name: bw-agent-windows-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Sync version from tag
        env:
          RELEASE_VERSION: ${{ inputs.tag || github.ref_name }}
        run: |
          node .github/scripts/sync-version.mjs

      - name: Prepare build environment
        uses: ./.github/actions/prepare-build
        with:
          rust-target: ${{ matrix.target }}
          install-tauri-linux-deps: 'true'

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.artifact-name }}
          cache-targets: 'false'

      # -----------------------------------------------------------------------
      # Signing / notarization (placeholders — see docs/RELEASE.md §6)
      #
      # Windows code signing: expects secrets WINDOWS_SIGN_CERTIFICATE (base64
      # PFX) and WINDOWS_SIGN_PASSWORD. Not wired yet.
      #
      # macOS codesign + notarization: expects secrets APPLE_TEAM_ID,
      # APPLE_CERTIFICATE (base64 p12), APPLE_CERTIFICATE_PASSWORD, APPLE_ID
      # and APPLE_APP_SPECIFIC_PASSWORD. Not wired yet.
      #
      # Promoting this workflow to produce signed bundles is an explicit
      # follow-up task.
      # -----------------------------------------------------------------------

      - name: Build CLI sidecar
        shell: bash
        run: |
          cargo build --release -p bw-agent --target ${{ matrix.target }}
          TRIPLE="${{ matrix.target }}"
          mkdir -p src-tauri/binaries
          if [ "$RUNNER_OS" = "Windows" ]; then
            EXT=".exe"
          else
            EXT=""
          fi
          cp "target/${TRIPLE}/release/bw-agent${EXT}" "src-tauri/binaries/bw-agent-${TRIPLE}${EXT}"
          # Hardlink for gpg.ssh.program — git calls it as a single executable,
          # so we use argv[0] detection instead of passing arguments.
          ln "src-tauri/binaries/bw-agent-${TRIPLE}${EXT}" "src-tauri/binaries/bw-agent-git-sign-${TRIPLE}${EXT}"
          echo "--- Sidecar binaries ---"
          ls -la src-tauri/binaries/

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        with:
          args: --verbose --target ${{ matrix.target }}

      - name: Collect Tauri artifacts
        run: |
          mkdir -p ./release_artifacts

          # Windows: .msi / .exe (NSIS)
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            shopt -s nullglob
            for f in \
              ./target/${{ matrix.target }}/release/bundle/msi/*.msi \
              ./target/${{ matrix.target }}/release/bundle/nsis/*.exe
            do
              cp "$f" ./release_artifacts/
            done
          fi

          # macOS: .dmg / .app.tar.gz (rename app.tar.gz to include arch to avoid collision)
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            shopt -s nullglob
            for f in \
              ./target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            do
              cp "$f" ./release_artifacts/
            done
            for f in \
              ./target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            do
              base=$(basename "$f")
              # bw-agent.app.tar.gz → bw-agent_aarch64.app.tar.gz / bw-agent_x86_64.app.tar.gz
              renamed="${base/.app.tar.gz/_${{ matrix.target }}.app.tar.gz}"
              cp "$f" "./release_artifacts/$renamed"
            done
          fi

          # Linux: .deb / .rpm / .AppImage
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            shopt -s nullglob
            for f in \
              ./target/${{ matrix.target }}/release/bundle/deb/*.deb \
              ./target/${{ matrix.target }}/release/bundle/rpm/*.rpm \
              ./target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            do
              cp "$f" ./release_artifacts/
            done
          fi

          echo "--- Artifacts ---"
          ls -la ./release_artifacts

      - name: Rename artifacts to match original semver
        env:
          RELEASE_VERSION: ${{ inputs.tag || github.ref_name }}
        run: node .github/scripts/rename-artifacts.mjs ./release_artifacts

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ./release_artifacts/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            VERSION="${{ inputs.tag }}"
          else
            # Strip refs/tags/ prefix
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets
          merge-multiple: false

      - name: Flatten release assets
        run: |
          mkdir -p flat_assets
          find release_assets -type f -exec mv {} flat_assets/ \;
          echo "--- Release assets ---"
          ls -la flat_assets/

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: ./flat_assets/*
          token: ${{ secrets.GITHUB_TOKEN }}
